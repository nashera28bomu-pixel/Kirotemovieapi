services:
  - type: web
    name: cymor-movie-api
    env: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
      - key: CYMOR_HUB_ORIGIN
        value: "*"

      # ---- Tier 1: try a different mirror first (free, zero code change) ----
      # Known alternates (per github.com/Simatwa/moviebox-api/issues/27):
      # moviebox.ph, moviebox.ke, moviebox.pk, moviebox.id, movieboxapp.in,
      # netnaija.video, netnaija.com, sflix.film, moviebox.ng
      # - key: MOVIEBOX_API_HOST
      #   value: moviebox.ph

      # ---- Tier 2: route through a proxy (costs money, only if Tier 1 fails) ----
      # httpx (used internally by moviebox-api) honours these by default —
      # not guaranteed to work since we can't confirm the library doesn't
      # override that, but worth trying before anything more invasive.
      # - key: HTTP_PROXY
      #   value: http://username:password@proxy-host:port
      # - key: HTTPS_PROXY
      #   value: http://username:password@proxy-host:port
